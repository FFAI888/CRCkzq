    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0d1117; color: #c9d1d9; padding: 16px; max-width: 680px; margin: auto; }
        h1 { color: #f0a500; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .section { background: #161b22; border: 1px solid #30363d; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
        h2 { color: #58a6ff; font-size: 18px; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .row { display: flex; align-items: center; margin-bottom: 10px; flex-wrap: nowrap; }
        .row label { width: 120px; font-weight: bold; color: #8b949e; font-size: 13px; flex-shrink: 0; }
        .row input, .row select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px; border-radius: 6px; font-size: 13px; margin-right: 8px; }
        .row input[type="text"] { flex: 1; min-width: 0; font-family: 'Courier New', monospace; overflow-x: auto; }
        .row select { flex: 0.7; min-width: 70px; }
        .row button { background: #238636; color: white; border: 1px solid #2ea043; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .row button:hover { background: #2ea043; }
        .current { font-size: 11px; color: #7ee787; margin-left: 5px; white-space: nowrap; flex-shrink: 0; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
        .note { font-size: 11px; color: #8b949e; margin-top: 4px; padding-left: 120px; }
        .status-row { display: flex; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        #walletStatus { color: #3fb950; margin-left: 10px; font-size: 13px; }
        #walletError { color: #f85149; font-size: 13px; margin-top: 5px; }
        .contract-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 12px; font-family: 'Courier New', monospace; }
    </style>
</head>

        </div>
        <div id="walletError"></div>
    </div>
    <div id="panels"></div>

        // 自动清理地址
        function cleanAddress(addr) { return addr ? addr.replace(/\s+/g, '') : ''; }

        function getProvider() {
            const w = window;
            if (w.okxwallet) return new ethers.providers.Web3Provider(w.okxwallet);
            if (w.ethereum) return new ethers.providers.Web3Provider(w.ethereum);
            document.getElementById('walletError').innerText = '❌ 未检测到钱包';
            return null;
        }

        async function connectWallet() {
            try {
                document.getElementById('walletError').innerText = '';
                const provider = getProvider();
                if (!provider) return;
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                document.getElementById('walletStatus').innerText = '✅ 已连接：' + (await signer.getAddress()).slice(0,6)+'...';
            } catch (e) {
                document.getElementById('walletError').innerText = '连接失败：' + e.message;
            }
        }

        async function connectContract() {
            let addr = cleanAddress(document.getElementById('contractAddress').value);
            if (!addr) return alert('请输入合约地址');
            if (!signer) await connectWallet();
            if (!signer) return alert('请先连接钱包');
            try {
                const provider = getProvider();
                contract = new ethers.Contract(addr, contractABI, provider.getSigner());
                alert('✅ 合约已连接！正在读取当前值...');
                loadAllCurrentValues(); // 连接后自动读取所有当前值
            } catch (e) {
                alert('合约连接失败：' + (e.reason || e.message));
            }
        }

        // 读取某个函数的值并更新到对应的span
        async function loadCurrentValue(funcName, elementId) {
            if (!contract) return;
            try {
                let val = await contract[funcName]();
                let display = val;
                if (typeof val === 'boolean') display = val ? '✅ 开启' : '❌ 关闭';
                else if (ethers.BigNumber.isBigNumber(val)) display = val.toString();
                else if (typeof val === 'string' && val.startsWith('0x')) display = val.length > 10 ? val.slice(0,6)+'...'+val.slice(-4) : val;
                document.getElementById(elementId).innerText = display;
                document.getElementById(elementId).style.color = '#7ee787';
            } catch (e) {
                document.getElementById(elementId).innerText = '读取失败';
                document.getElementById(elementId).style.color = '#f85149';
            }
        }

        // 批量加载所有静态参数（无入参的view函数）
        function loadAllCurrentValues() {
            const items = [
                '_buyFundFee','_buyLPFee','buy_burnFee','_sellFundFee','_sellLPFee','sell_burnFee',
                'addLiquidityFee','removeLiquidityFee','lpBurnRate','lpBurnFrequency',
                'maxWalletAmount','kb','airdropNumbs','numTokensSellRate','price','amountPerUnits','mintLimit',
                'enableMint','enablePause','enableRewardList','enableWalletLimit','enableKillBlock','enableChangeTax','airdropEnable',
                'pause','cooldownEnabled','cooldownTime','fundAddress','owner','startTradeBlock','totalSupply'
            ];
            items.forEach(func => {
                let elem = document.getElementById('cur_'+func);
                if (elem) loadCurrentValue(func, 'cur_'+func);
            });
            // 特殊显示死地址、主交易对等
            if (document.getElementById('cur_deadAddress')) loadCurrentValue('deadAddress', 'cur_deadAddress');
            if (document.getElementById('cur__mainPair')) loadCurrentValue('_mainPair', 'cur__mainPair');
        }

                { title: '🏦 基金与交易对', items: [
                    { label: '当前基金地址', func: 'fundAddress', type: 'viewOnly' },
                    { label: '设置基金地址', func: 'setFundAddress', type: 'address', note: '修改手续费的收款地址。' },
                    { label: '设置交易对', func: 'setSwapPairList', type: 'addressBool', note: '添加/移除swap交易对。' },
                    { label: '防闪电贷开关', func: 'setAntiSYNCEnable', type: 'bool', viewFunc: 'antiSYNC' }
                ]},
                { title: '💸 提现', items: [
                    { label: '提取代币/BNB', func: 'setClaims', type: 'addressUint', note: '代币合约地址（提BNB填0x0），数量。' }
                ]}
            ];

            let html = '';
            for (let sec of sections) {
                html += `<div class="section"><h2>${sec.title}</h2>`;
                for (let item of sec.items) {
                    let inputHtml = '';
                    let currentSpan = '';
                    // 生成当前值显示区
                    if (item.viewFunc) {
                        currentSpan = `<span class="current" id="cur_${item.viewFunc}">加载中...</span>`;
                    } else if (item.viewFuncs) {
                        currentSpan = item.viewFuncs.map(f => `<span class="current" id="cur_${f}">加载中...</span>`).join(' ');
                    } else if (item.type === 'viewOnly') {
                        currentSpan = `<span class="current" id="cur_${item.func}">加载中...</span>`;
                    }

                    if (item.type === 'action') {
                        inputHtml = `<button onclick="callContract('${item.func}')">执行</button>${currentSpan}`;
                    } else if (item.type === 'bool') {
                        inputHtml = `<select id="${item.func}_val"><option value="true">开启</option><option value="false">关闭</option></select>`;
                        inputHtml += `<button onclick="callContractAndRefresh('${item.func}', document.getElementById('${item.func}_val').value, '${item.viewFunc}')">设置</button>${currentSpan}`;
                    } else if (item.type === 'uint256') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="数字">`;
                        inputHtml += `<button onclick="callContractAndRefresh('${item.func}', document.getElementById('${item.func}_val').value, '${item.viewFunc}')">设置</button>${currentSpan}`;
                    } else if (item.type === 'address') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="0x..." style="width:100%;">`;
                        inputHtml += `<button onclick="callContractAndRefresh('${item.func}', cleanAddress(document.getElementById('${item.func}_val').value), '${item.viewFunc}')">设置</button>${currentSpan}`;
                    } else if (item.type === 'addressBool') {
                        inputHtml = `<input type="text" id="${item.func}_addr" placeholder="地址">`;
                        inputHtml += `<select id="${item.func}_bool"><option value="true">true</option><option value="false">false</option></select>`;
                        inputHtml += `<button onclick="callContract('${item.func}', cleanAddress(document.getElementById('${item.func}_addr').value), document.getElementById('${item.func}_bool').value)">设置</button>`;
                    } else if (item.type === 'addressBoolArray') {
                        inputHtml = `<input type="text" id="${item.func}_addr" placeholder='["0x...","0x..."]' style="width:100%;">`;
                        inputHtml += `<select id="${item.func}_bool"><option value="true">true</option><option value="false">false</option></select>`;
                        inputHtml += `<button onclick="handleArrayCall('${item.func}')">设置</button>`;
                    } else if (item.type === 'uint256[6]') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="100,100,100,100,100,100" style="width:100%;">`;
                        inputHtml += `<button onclick="handleUint6Call('${item.func}')">设置</button>`;
                    } else if (item.type === 'addressUint') {
                        inputHtml = `<input type="text" id="${item.func}_addr" placeholder="地址" style="width:60%;">`;
                        inputHtml += `<input type="text" id="${item.func}_amount" placeholder="数量" style="width:35%;">`;
                        inputHtml += `<button onclick="callContract('${item.func}', cleanAddress(document.getElementById('${item.func}_addr').value), document.getElementById('${item.func}_amount').value)">设置</button>`;
                    } else if (item.type === 'viewOnly' || item.type === 'viewOnlyGroup') {
                        inputHtml = `${currentSpan}`;
                    }
                    let note = item.note ? `<div class="note">💡 ${item.note}</div>` : '';
                    html += `<div class="row"><label>${item.label}</label>${inputHtml}</div>${note}`;
                }
                html += `</div>`;
            }
            document.getElementById('panels').innerHTML = html;
        }

        async function callContract(funcName, ...args) {
            if (!contract) return alert('请先连接合约！');
            try {
                let parsedArgs = args.map(arg => {
                    if (Array.isArray(arg)) return arg;
                    if (arg === 'true') return true;
                    if (arg === 'false') return false;
                    if (typeof arg === 'string' && arg.startsWith('0x')) arg = cleanAddress(arg);
                    if (typeof arg === 'string' && !isNaN(arg) && arg.trim() !== '') return ethers.BigNumber.from(arg);
                    return arg;
                });
                let tx = await contract[funcName](...parsedArgs);
                await tx.wait();
                alert('✅ 交易成功！');
                return true;
            } catch (e) {
                alert('❌ 失败：' + (e.reason || e.message));
                return false;
            }
        }

        async function callContractAndRefresh(funcName, ...args) {
            if (await callContract(funcName, ...args)) {
                // 刷新关联的视图
                if (args.length > 0 && typeof args[args.length-1] === 'string' && args[args.length-1].startsWith('cur_')) {
                    // 最后一个参数是viewFunc名，但我们直接传入viewFunc不太方便，这里简化：重新加载所有当前值
                    loadAllCurrentValues();
                } else {
                    loadAllCurrentValues();
                }
            }
        }

        function handleArrayCall(funcName) {
            let addrStr = document.getElementById(funcName + '_addr').value;
            let boolVal = document.getElementById(funcName + '_bool').value === 'true';
            if (!addrStr) return alert('请输入地址');
            let addrArray;
            try {
                addrArray = JSON.parse(addrStr);
            } catch (e) {
                addrArray = addrStr.split(',').map(a => cleanAddress(a.trim()));
            }
            callContract(funcName, addrArray, boolVal);
        }

        function handleUint6Call(funcName) {
            let valStr = document.getElementById(funcName + '_val').value;
            if (!valStr) return alert('请输入6个数字');
            let arr = valStr.split(',').map(v => ethers.BigNumber.from(v.trim()));
            if (arr.length !== 6) return alert('必须输入6个数字');
            callContract(funcName, arr);
        }

        waitForEthers(() => {
            buildUI();
            const w = window;
            if (w.okxwallet || w.ethereum) {
                document.getElementById('walletStatus').innerText = '🟢 钱包已检测到';
            }
        });
    </script>
</body>
</html>
