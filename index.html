<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐼 熊猫代币 · 终极控制台 V4</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0d1117; color: #c9d1d9; padding: 16px; max-width: 700px; margin: auto; }
        h1 { color: #f0a500; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .section { background: #161b22; border: 1px solid #30363d; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
        h2 { color: #58a6ff; font-size: 18px; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .row { display: flex; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .row label { width: 130px; font-weight: bold; color: #8b949e; font-size: 13px; flex-shrink: 0; }
        .row textarea, .row input, .row select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px; border-radius: 6px; font-size: 13px; margin-right: 8px; font-family: 'Courier New', monospace; }
        .row textarea { width: 100%; min-height: 40px; resize: vertical; }
        .row select { min-width: 80px; }
        .row button { background: #238636; color: white; border: 1px solid #2ea043; padding: 8px 14px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .row button:hover { background: #2ea043; }
        .current { font-size: 12px; color: #7ee787; margin-left: 8px; white-space: nowrap; }
        .note { font-size: 11px; color: #8b949e; margin-top: 4px; margin-bottom: 8px; padding-left: 130px; }
        .info-box { background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; margin-bottom: 10px; }
        .info-box p { margin: 4px 0; font-size: 13px; }
        .info-box span { color: #f0a500; font-weight: bold; }
        #walletStatus { color: #3fb950; margin-left: 10px; font-size: 13px; }
        #walletError { color: #f85149; font-size: 13px; margin-top: 5px; }
        .contract-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 12px; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <h1>🐼 熊猫代币 · 终极控制台 V4</h1>
    <div class="section">
        <input type="text" class="contract-input" id="contractAddress" placeholder="代币合约地址 (0x...)">
        <div style="display:flex; align-items:center; flex-wrap:wrap;">
            <button onclick="connectWallet()" style="background:#1f6feb; border-color:#1f6feb; margin-right:10px;">连接钱包</button>
            <button onclick="connectContract()" style="background:#f0a500; border-color:#f0a500; color:black;">连接合约</button>
            <span id="walletStatus">⚪ 未连接</span>
        </div>
        <div id="walletError"></div>
    </div>

    <div class="section" id="infoSection" style="display:none;">
        <h2>🔍 信息查询</h2>
        <div class="row">
            <label>查询地址状态</label>
            <textarea id="queryAddress" placeholder="输入钱包地址" rows="1"></textarea>
            <button onclick="queryAddressStatus()">查询</button>
        </div>
        <div id="queryResult" class="info-box" style="display:none;"></div>
        <div class="row" style="margin-top:15px;">
            <label>主交易对信息</label>
            <button onclick="loadPairInfo()">刷新</button>
        </div>
        <div id="pairInfo" class="info-box"></div>
    </div>

    <div id="panels"></div>

    <script>

            else setTimeout(() => waitForEthers(callback), 500);
        }

        function cleanAddress(addr) { return addr ? addr.replace(/\s+/g, '') : ''; }

        function getProvider() {
            const w = window;
            if (w.okxwallet) return new ethers.providers.Web3Provider(w.okxwallet);
            if (w.ethereum) return new ethers.providers.Web3Provider(w.ethereum);
            document.getElementById('walletError').innerText = '❌ 未检测到钱包，请使用欧易App内置浏览器打开。';
            return null;
        }

        async function connectWallet() {
            try {
                document.getElementById('walletError').innerText = '';
                const provider = getProvider();
                if (!provider) return;
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                document.getElementById('walletStatus').innerText = '✅ 已连接：' + (await signer.getAddress()).slice(0,6)+'...';
            } catch (e) {
                document.getElementById('walletError').innerText = '连接失败：' + e.message;
            }
        }

        async function connectContract() {
            let addr = cleanAddress(document.getElementById('contractAddress').value);
            if (!addr) return alert('请输入合约地址');
            if (!signer) await connectWallet();
            if (!signer) return alert('请先连接钱包');
            try {
                const provider = getProvider();
                contract = new ethers.Contract(addr, contractABI, provider.getSigner());
                decimals = await contract.decimals();
                mainPairAddress = await contract._mainPair();
                alert('✅ 合约已连接！');
                document.getElementById('infoSection').style.display = 'block';
                loadAllCurrentValues();
                loadPairInfo();
            } catch (e) {
                alert('合约连接失败：' + (e.reason || e.message));
            }
        }

        async function loadCurrentValue(funcName, elementId) {
            if (!contract) return;
            try {
                let val = await contract[funcName]();
                let display = val;
                if (typeof val === 'boolean') display = val ? '✅ 开启' : '❌ 关闭';
                else if (ethers.BigNumber.isBigNumber(val)) display = val.toString();
                else if (typeof val === 'string' && val.startsWith('0x')) display = val.length > 10 ? val.slice(0,6)+'...'+val.slice(-4) : val;
                document.getElementById(elementId).innerText = display;
            } catch (e) {
                document.getElementById(elementId).innerText = '读取失败';
            }
        }

        function loadAllCurrentValues() {
            const items = [
                '_buyFundFee','_buyLPFee','buy_burnFee','_sellFundFee','_sellLPFee','sell_burnFee',
                'addLiquidityFee','removeLiquidityFee','lpBurnRate','lpBurnFrequency',
                'maxWalletAmount','kb','airdropNumbs','numTokensSellRate','price','amountPerUnits','mintLimit',
                'enableMint','enablePause','enableRewardList','enableWalletLimit','enableKillBlock','enableChangeTax','airdropEnable',
                'pause','cooldownEnabled','cooldownTime','fundAddress','owner','startTradeBlock','totalSupply'
            ];
            items.forEach(func => {
                let elem = document.getElementById('cur_'+func);
                if (elem) loadCurrentValue(func, 'cur_'+func);
            });
        }

        async function queryAddressStatus() {
            if (!contract) return alert('请先连接合约');
            let addr = cleanAddress(document.getElementById('queryAddress').value);
            if (!addr) return alert('请输入地址');
            try {
                let allWhite = await contract._allWhiteList(addr);
                let feeWhite = await contract._feeWhiteList(addr);
                let reward = await contract._rewardList(addr);
                let swapPair = await contract._swapPairList(addr);
                let balance = await contract.balanceOf(addr);
                let resultHtml = `
                    <p>地址：<span>${addr}</span></p>
                    <p>全功能白名单：<span>${allWhite ? '✅ 是' : '❌ 否'}</span></p>
                    <p>手续费白名单：<span>${feeWhite ? '✅ 是' : '❌ 否'}</span></p>
                    <p>黑名单：<span>${reward ? '⚠️ 是' : '❌ 否'}</span></p>
                    <p>交易对：<span>${swapPair ? '✅ 是' : '❌ 否'}</span></p>
                    <p>代币余额：<span>${ethers.utils.formatUnits(balance, decimals)} CRC</span></p>
                `;
                document.getElementById('queryResult').innerHTML = resultHtml;
                document.getElementById('queryResult').style.display = 'block';
            } catch (e) {
                alert('查询失败：' + e.message);
            }
        }

        async function loadPairInfo() {
            if (!contract || !mainPairAddress) return;
            const pairABI = [
                "function getReserves() external view returns (uint112 reserve0, uint112 reserve1, uint32 blockTimestampLast)",
                "function token0() external view returns (address)",
                "function token1() external view returns (address)"
            ];
            try {
                const provider = getProvider();
                const pair = new ethers.Contract(mainPairAddress, pairABI, provider);
                const [res0, res1, ts] = await pair.getReserves();
                const token0 = await pair.token0();
                const isToken0 = token0.toLowerCase() === contract.address.toLowerCase();
                const tokenReserve = isToken0 ? res0 : res1;
                const usdtReserve = isToken0 ? res1 : res0;
                document.getElementById('pairInfo').innerHTML = `
                    <p>交易对地址：<span>${mainPairAddress}</span></p>
                    <p>CRC储备量：<span>${ethers.utils.formatUnits(tokenReserve, decimals)} CRC</span></p>
                    <p>USDT储备量：<span>${ethers.utils.formatUnits(usdtReserve, 18)} USDT</span></p>
                    <p>更新时间：<span>${new Date(ts * 1000).toLocaleString()}</span></p>
                `;
            } catch (e) {
                document.getElementById('pairInfo').innerHTML = `<p style="color:#f85149;">获取交易对信息失败：${e.message}</p>`;
            }
        }

        // 核心执行函数，不弹窗，返回布尔值
        async function _executeTx(funcName, ...args) {
            if (!contract) { alert('请先连接合约'); return false; }
            try {
                let parsedArgs = args.map(arg => {
                    if (Array.isArray(arg)) return arg;
                    if (arg === 'true') return true;
                    if (arg === 'false') return false;
                    if (typeof arg === 'string' && arg.startsWith('0x')) arg = cleanAddress(arg);
                    if (typeof arg === 'string' && !isNaN(arg) && arg.trim() !== '') return ethers.BigNumber.from(arg);
                    return arg;
                });
                let tx = await contract[funcName](...parsedArgs);
                await tx.wait();
                return true;
            } catch (e) {
                alert('❌ 失败：' + (e.reason || e.message));
                return false;
            }
        }

        // 普通调用（带弹窗）
        async function callContract(funcName, ...args) {
            if (await _executeTx(funcName, ...args)) {
                alert('✅ 交易成功！');
            }
        }

        // 修改后自动刷新全部数值，并弹窗
        async function callContractAndRefresh(funcName, ...args) {
            if (await _executeTx(funcName, ...args)) {
                loadAllCurrentValues();
                if (funcName === 'setSwapPairList' || funcName === 'setFundAddress' || funcName === 'recoverTransaction' || funcName === 'PauseTransaction') {
                    mainPairAddress = await contract._mainPair();
                    loadPairInfo();
                }
                alert('✅ 设置成功，页面数值已自动更新。');
            }
        }

        function handleArrayCall(funcName) {
            let addrStr = document.getElementById(funcName + '_addr').value;
            let boolVal = document.getElementById(funcName + '_bool').value === 'true';
            if (!addrStr) return alert('请输入地址');
            let addrArray;
            try {
                addrArray = JSON.parse(addrStr);
            } catch (e) {
                addrArray = addrStr.split(',').map(a => cleanAddress(a.trim()));
            }
            callContractAndRefresh(funcName, addrArray, boolVal);
        }

        function handleUint6Call(funcName) {
            let valStr = document.getElementById(funcName + '_val').value;
            if (!valStr) return alert('请输入6个数字');
            let arr = valStr.split(',').map(v => ethers.BigNumber.from(v.trim()));
            if (arr.length !== 6) return alert('必须输入6个数字');
            callContractAndRefresh(funcName, arr);
        }

        function buildUI() {
            const sections = [
                { title: '⚡ 交易控制', items: [
                    { label: '开启交易', func: 'recoverTransaction', type: 'action' },
                    { label: '暂停交易', func: 'PauseTransaction', type: 'action' },
                    { label: '暂停功能开关', func: 'setEnablePause', type: 'bool', viewFunc: 'enablePause' },
                    { label: '当前暂停状态', func: 'pause', type: 'viewOnly' }
                ]},
                { title: '💰 钱包限制', items: [
                    { label: '启用钱包限额', func: 'setEnableWalletLimit', type: 'bool', viewFunc: 'enableWalletLimit' },
                    { label: '最大持币量', func: 'changeWalletLimit', type: 'uint256', viewFunc: 'maxWalletAmount', note: '精度10。' }
                ]},
                { title: '📋 白名单/黑名单', items: [
                    { label: '全功能白名单', func: 'setWhiteList', type: 'addressBoolArray', note: '地址数组 + true/false' },
                    { label: '手续费白名单', func: 'setFeeWhiteList', type: 'addressBoolArray', note: '地址数组 + true/false' },
                    { label: '黑名单功能开关', func: 'setEnableRewardList', type: 'bool', viewFunc: 'enableRewardList' },
                    { label: '批量拉黑', func: 'multi_bclist', type: 'addressBoolArray', note: '地址数组 + true' }
                ]},
                { title: '🧾 税率设置', items: [
                    { label: '允许修改税率', func: 'setEnableChangeTax', type: 'bool', viewFunc: 'enableChangeTax' },
                    { label: '买入税率', func: 'buyTax', type: 'viewOnlyGroup', viewFuncs: ['_buyFundFee','_buyLPFee','buy_burnFee'], note: '基金/LP/销毁 (万分比)' },
                    { label: '卖出税率', func: 'sellTax', type: 'viewOnlyGroup', viewFuncs: ['_sellFundFee','_sellLPFee','sell_burnFee'], note: '基金/LP/销毁 (万分比)' },
                    { label: '修改买卖税率', func: 'completeCustoms', type: 'uint256[6]', note: '顺序：买基金,买LP,买销毁,卖基金,卖LP,卖销毁' },
                    { label: '自动兑换比例', func: 'setNumTokensSellRate', type: 'uint256', viewFunc: 'numTokensSellRate' },
                    { label: '添加流动性费率', func: 'setAddLiquidityFee', type: 'uint256', viewFunc: 'addLiquidityFee', note: '最大2500' },
                    { label: '移除流动性费率', func: 'setRemoveLiquidityFee', type: 'uint256', viewFunc: 'removeLiquidityFee', note: '最大10000' }
                ]},
                { title: '🔥 LP销毁', items: [
                    { label: '销毁比例', func: 'setlpBurnRate', type: 'uint256', viewFunc: 'lpBurnRate' },
                    { label: '销毁频率(小时)', func: 'setlpBurnFrequency', type: 'uint256', viewFunc: 'lpBurnFrequency' }
                ]},
                { title: '🛡️ 防狙击', items: [
                    { label: '启用杀区块', func: 'setEnableKillBlock', type: 'bool', viewFunc: 'enableKillBlock' },
                    { label: '保护区块数', func: 'setkb', type: 'uint256', viewFunc: 'kb' }
                ]},
                { title: '🎁 空投', items: [
                    { label: '启用空投', func: 'setAirDropEnable', type: 'bool', viewFunc: 'airdropEnable' },
                    { label: '空投人数', func: 'setAirdropNumbs', type: 'uint256', viewFunc: 'airdropNumbs' }
                ]},
                { title: '🏭 增发', items: [
                    { label: '启用增发', func: 'setEnableMint', type: 'bool', viewFunc: 'enableMint' },
                    { label: '增发代币', func: 'mintTokens', type: 'addressUint', note: '接收地址 + 数量' }
                ]},
                { title: '💎 预售参数', items: [
                    { label: '预售价格', func: 'setPrice', type: 'uint256', viewFunc: 'price' },
                    { label: '每份数量', func: 'setAmountPerUnits', type: 'uint256', viewFunc: 'amountPerUnits' },
                    { label: '预售总份数', func: 'setMintLimit', type: 'uint256', viewFunc: 'mintLimit' }
                ]},
                { title: '⏳ 交易冷却', items: [
                    { label: '启用冷却', func: 'setCooldownEnabled', type: 'bool', viewFunc: 'cooldownEnabled' },
                    { label: '冷却时间(秒)', func: 'setCooldownTime', type: 'uint256', viewFunc: 'cooldownTime' }
                ]},
                { title: '👑 所有权', items: [
                    { label: '当前Owner', func: 'owner', type: 'viewOnly' },
                    { label: '转移所有权', func: 'transferOwnership', type: 'address', note: '新老板地址' }
                ]},
                { title: '🏦 基金与交易对', items: [
                    { label: '当前基金地址', func: 'fundAddress', type: 'viewOnly' },
                    { label: '设置基金地址', func: 'setFundAddress', type: 'address', viewFunc: 'fundAddress' },
                    { label: '设置交易对', func: 'setSwapPairList', type: 'addressBool' },
                    { label: '防闪电贷开关', func: 'setAntiSYNCEnable', type: 'bool', viewFunc: 'antiSYNC' }
                ]},
                { title: '💸 提现', items: [
                    { label: '提取代币/BNB', func: 'setClaims', type: 'addressUint', note: '代币地址(0x0为BNB) + 数量' }
                ]}
            ];

            let html = '';
            for (let sec of sections) {
                html += `<div class="section"><h2>${sec.title}</h2>`;
                for (let item of sec.items) {
                    let inputHtml = '';
                    let currentSpan = '';
                    if (item.viewFunc) {
                        currentSpan = `<span class="current" id="cur_${item.viewFunc}">加载中...</span>`;
                    } else if (item.viewFuncs) {
                        currentSpan = item.viewFuncs.map(f => `<span class="current" id="cur_${f}">加载中...</span>`).join(' ');
                    } else if (item.type === 'viewOnly') {
                        currentSpan = `<span class="current" id="cur_${item.func}">加载中...</span>`;
                    }

                    if (item.type === 'action') {
                        inputHtml = `<button onclick="callContractAndRefresh('${item.func}')">执行</button>${currentSpan}`;
                    } else if (item.type === 'bool') {
                        inputHtml = `<select id="${item.func}_val"><option value="true">开启</option><option value="false">关闭</option></select>`;
                        inputHtml += `<button onclick="callContractAndRefresh('${item.func}', document.getElementById('${item.func}_val').value)">设置</button>${currentSpan}`;
                    } else if (item.type === 'uint256') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="数字">`;
                        inputHtml += `<button onclick="callContractAndRefresh('${item.func}', document.getElementById('${item.func}_val').value)">设置</button>${currentSpan}`;
                    } else if (item.type === 'address') {
                        inputHtml = `<textarea id="${item.func}_val" placeholder="0x..." rows="1"></textarea>`;
                        inputHtml += `<button onclick="callContractAndRefresh('${item.func}', cleanAddress(document.getElementById('${item.func}_val').value))">设置</button>${currentSpan}`;
                    } else if (item.type === 'addressBool') {
                        inputHtml = `<textarea id="${item.func}_addr" placeholder="地址" rows="1"></textarea>`;
                        inputHtml += `<select id="${item.func}_bool"><option value="true">true</option><option value="false">false</option></select>`;
                        inputHtml += `<button onclick="callContractAndRefresh('${item.func}', cleanAddress(document.getElementById('${item.func}_addr').value), document.getElementById('${item.func}_bool').value)">设置</button>`;
                    } else if (item.type === 'addressBoolArray') {
                        inputHtml = `<textarea id="${item.func}_addr" placeholder='["0x...","0x..."] 或 逗号分隔' rows="2"></textarea>`;
                        inputHtml += `<select id="${item.func}_bool"><option value="true">true</option><option value="false">false</option></select>`;
                        inputHtml += `<button onclick="handleArrayCall('${item.func}')">设置</button>`;
                    } else if (item.type === 'uint256[6]') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="100,100,100,100,100,100">`;
                        inputHtml += `<button onclick="handleUint6Call('${item.func}')">设置</button>`;
                    } else if (item.type === 'addressUint') {
                        inputHtml = `<textarea id="${item.func}_addr" placeholder="地址" rows="1"></textarea>`;
                        inputHtml += `<input type="text" id="${item.func}_amount" placeholder="数量">`;
                        inputHtml += `<button onclick="callContractAndRefresh('${item.func}', cleanAddress(document.getElementById('${item.func}_addr').value), document.getElementById('${item.func}_amount').value)">设置</button>`;
                    } else if (item.type === 'viewOnly' || item.type === 'viewOnlyGroup') {
                        inputHtml = `${currentSpan}`;
                    }
                    let note = item.note ? `<div class="note">💡 ${item.note}</div>` : '';
                    html += `<div class="row"><label>${item.label}</label>${inputHtml}</div>${note}`;
                }
                html += `</div>`;
            }
            document.getElementById('panels').innerHTML = html;
        }

        waitForEthers(() => {
            buildUI();
            if (window.okxwallet || window.ethereum) {
                document.getElementById('walletStatus').innerText = '🟢 钱包已检测到';
            }
        });
    </script>
</body>
</html>
