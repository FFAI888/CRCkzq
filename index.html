<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PandaToken 连接测试</title>
</head>
<body style="background:#1a1a2e;color:white;font-family:sans-serif;padding:20px;">
    <h1>🐼 PandaToken 连接测试 v1.0</h1>
    <button id="connectBtn">🔌 连接钱包</button>
    <br><br>
    <input type="text" id="contractAddr" placeholder="输入合约地址 (0x...)" style="width:400px;padding:10px;">
    <button id="loadBtn">📋 加载合约</button>
    <hr>
    <div id="status"></div>
    <div id="info"></div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script>
        // 完全避开 window.web3 冲突
        if (window.ethereum) {
            try { delete window.web3; } catch(e) {}
            Object.defineProperty(window, 'web3', { writable: true, configurable: true, value: undefined });
        }

        let myWeb3 = null;
        let myAccount = null;
        let myContract = null;
        const contractABI = [
            "function name() view returns (string)",
            "function symbol() view returns (string)",
            "function totalSupply() view returns (uint256)",
            "function owner() view returns (address)"
        ];

        document.getElementById('connectBtn').addEventListener('click', async () => {
            document.getElementById('status').innerText = '正在连接...';
            try {
                if (!window.ethereum) {
                    document.getElementById('status').innerText = '❌ 请安装 OKX 钱包或 MetaMask';
                    return;
                }
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                myAccount = accounts[0];
                myWeb3 = new Web3(window.ethereum);
                document.getElementById('status').innerText = '✅ 已连接: ' + myAccount;
            } catch (e) {
                document.getElementById('status').innerText = '❌ 连接失败: ' + (e.message || e);
            }
        });

        document.getElementById('loadBtn').addEventListener('click', async () => {
            if (!myWeb3 || !myAccount) {
                document.getElementById('status').innerText = '❌ 请先连接钱包';
                return;
            }
            const addr = document.getElementById('contractAddr').value.trim();
            if (!myWeb3.utils.isAddress(addr)) {
                document.getElementById('status').innerText = '❌ 地址无效';
                return;
            }
            try {
                myContract = new myWeb3.eth.Contract(contractABI, addr);
                const name = await myContract.methods.name().call();
                const symbol = await myContract.methods.symbol().call();
                const totalSupply = await myContract.methods.totalSupply().call();
                const owner = await myContract.methods.owner().call();
                document.getElementById('info').innerHTML = 
                    `<b>名称:</b> ${name}<br><b>符号:</b> ${symbol}<br><b>总供应:</b> ${myWeb3.utils.fromWei(totalSupply, 'ether')}<br><b>Owner:</b> ${owner}`;
                document.getElementById('status').innerText = '✅ 合约加载成功';
            } catch (e) {
                document.getElementById('status').innerText = '❌ 加载失败: ' + (e.message || e);
            }
        });
    </script>
</body>
</html>
