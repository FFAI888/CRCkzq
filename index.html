<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐼 熊猫代币管理 V2</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0d1117; color: #c9d1d9; padding: 16px; max-width: 680px; margin: auto; }
        h1 { color: #f0a500; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .section { background: #161b22; border: 1px solid #30363d; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
        h2 { color: #58a6ff; font-size: 18px; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .row { display: flex; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .row label { width: 130px; font-weight: bold; color: #8b949e; font-size: 14px; flex-shrink: 0; }
        .row input, .row select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 10px; border-radius: 6px; font-size: 14px; margin-right: 8px; flex: 1; min-width: 120px; }
        .row select { flex: 0.5; min-width: 80px; }
        .row button { background: #238636; color: white; border: 1px solid #2ea043; padding: 8px 14px; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .row button:hover { background: #2ea043; }
        .row .unit { color: #8b949e; font-size: 12px; margin-left: 5px; white-space: nowrap; }
        .note { font-size: 11px; color: #8b949e; margin-top: 4px; width: 100%; padding-left: 130px; }
        .status-row { display: flex; align-items: center; margin-bottom: 15px; }
        .status-row label { width: 80px; color: #8b949e; font-weight: bold; }
        #walletStatus { color: #3fb950; margin-left: 5px; font-size: 13px; }
        #walletError { color: #f85149; font-size: 13px; margin-top: 5px; }
        .contract-input { width: 100%; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <h1>🐼 熊猫代币 · 控制中心</h1>

    <!-- 顶部连接区 -->
    <div class="section">
        <input type="text" class="contract-input" id="contractAddress" placeholder="请输入你的代币合约地址 (0x...)">
        <div class="status-row">
            <button onclick="connectWallet()" style="background:#1f6feb; border-color:#1f6feb; margin-right:10px;">连接钱包</button>
            <button onclick="connectContract()" style="background:#f0a500; border-color:#f0a500; color:black;">连接合约</button>
            <span id="walletStatus">⚪ 未连接</span>
        </div>
        <div id="walletError"></div>
    </div>

    <div id="panels"></div>

        // ✅ 自动清理地址功能：去空格、去换行
        function cleanAddress(addr) {
            if (!addr) return '';
            return addr.replace(/\s+/g, ''); // 去掉所有空格和换行
        }

        function getProvider() {
            const w = window;
            if (w.okxwallet) return new ethers.providers.Web3Provider(w.okxwallet);
            if (w.ethereum) return new ethers.providers.Web3Provider(w.ethereum);
            if (w.okexchain) return new ethers.providers.Web3Provider(w.okexchain);
            document.getElementById('walletError').innerText = '❌ 未检测到钱包，请使用欧易App内置浏览器打开。';
            return null;
        }

        async function connectWallet() {
            try {
                document.getElementById('walletError').innerText = '';
                const provider = getProvider();
                if (!provider) return;
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                const addr = await signer.getAddress();
                document.getElementById('walletStatus').innerText = '✅ 已连接：' + addr.slice(0,6)+'...';
            } catch (e) {
                document.getElementById('walletError').innerText = '连接失败：' + (e.message || e);
            }
        }

        async function connectContract() {
            let addr = document.getElementById('contractAddress').value;
            addr = cleanAddress(addr); // 自动清理
            if (!addr) { alert('请输入合约地址'); return; }
            if (!signer) {
                await connectWallet();
                if (!signer) { alert('请先连接钱包！'); return; }
            }
            try {
                const provider = getProvider();
                if (!provider) return;
                contract = new ethers.Contract(addr, contractABI, provider.getSigner());
                alert('✅ 合约已连接！控制面板已激活。');
            } catch (e) {
                alert('合约连接失败：' + (e.reason || e.message));
            }
        }

                    { label: '设置全功能白名单', func: 'setWhiteList', type: 'addressBoolArray', note: '白名单地址可绕过暂停、限额等检查。格式：["0x...","0x..."]' },
                    { label: '设置手续费白名单', func: 'setFeeWhiteList', type: 'addressBoolArray', note: '白名单地址免收所有交易手续费。格式：["0x..."]' },
                    { label: '黑名单功能开关', func: 'setEnableRewardList', type: 'bool', note: '开启后，被拉黑的地址将无法转出代币。' },

                ]},
                { title: '🧾 税率设置', items: [
                    { label: '允许修改税率', func: 'setEnableChangeTax', type: 'bool', note: '开启后，才可以修改下面的各项税率。' },

                    { label: '自动兑换比例', func: 'setNumTokensSellRate', type: 'uint256', note: '达到多少比例后，自动将手续费兑换为基金/LP。' },

                    { label: '空投人数', func: 'setAirdropNumbs', type: 'uint256', note: '每次交易随机空投给多少人。最大5。' }
                ]},
                { title: '🏭 增发', items: [

                ]},
                { title: '👑 所有权', items: [
                    { label: '转移所有权', func: 'transferOwnership', type: 'address', note: '把合约老板权限转给另一个地址。请谨慎操作！' }

                    { label: '设置基金地址', func: 'setFundAddress', type: 'address', note: '修改手续费的接收地址。' },

                ]}
            ];

            let html = '';
            for (let sec of sections) {
                html += `<div class="section"><h2>${sec.title}</h2>`;
                for (let item of sec.items) {
                    let inputHtml = '';
                    if (item.type === 'action') {
                        inputHtml = `<button onclick="callContract('${item.func}')">执行</button>`;
                    } else if (item.type === 'bool') {
                        inputHtml = `<select id="${item.func}_val"><option value="true">开启</option><option value="false">关闭</option></select>`;
                        inputHtml += `<button onclick="callContract('${item.func}', document.getElementById('${item.func}_val').value)">设置</button>`;
                    } else if (item.type === 'uint256') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="输入数字">`;
                        inputHtml += `<button onclick="callContract('${item.func}', document.getElementById('${item.func}_val').value)">设置</button>`;
                    } else if (item.type === 'address') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="0x...">`;
                        inputHtml += `<button onclick="callContract('${item.func}', cleanAddress(document.getElementById('${item.func}_val').value))">设置</button>`;
                    } else if (item.type === 'addressBool') {
                        inputHtml = `<input type="text" id="${item.func}_addr" placeholder="地址">`;
                        inputHtml += `<select id="${item.func}_bool"><option value="true">true</option><option value="false">false</option></select>`;
                        inputHtml += `<button onclick="callContract('${item.func}', cleanAddress(document.getElementById('${item.func}_addr').value), document.getElementById('${item.func}_bool').value)">设置</button>`;
                    } else if (item.type === 'addressBoolArray') {
                        inputHtml = `<input type="text" id="${item.func}_addr" placeholder='["0x...","0x..."]'>`;
                        inputHtml += `<select id="${item.func}_bool"><option value="true">true</option><option value="false">false</option></select>`;
                        inputHtml += `<button onclick="handleArrayCall('${item.func}')">设置</button>`;
                    } else if (item.type === 'uint256[6]') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="100,100,100,100,100,100">`;
                        inputHtml += `<button onclick="handleUint6Call('${item.func}')">设置</button>`;
                    } else if (item.type === 'addressUint') {
                        inputHtml = `<input type="text" id="${item.func}_addr" placeholder="地址">`;
                        inputHtml += `<input type="text" id="${item.func}_amount" placeholder="数量">`;
                        inputHtml += `<button onclick="callContract('${item.func}', cleanAddress(document.getElementById('${item.func}_addr').value), document.getElementById('${item.func}_amount').value)">设置</button>`;
                    }
                    let note = item.note ? `<div class="note">💡 ${item.note}</div>` : '';
                    html += `<div class="row"><label>${item.label}</label>${inputHtml}</div>${note}`;
                }
                html += `</div>`;
            }
            document.getElementById('panels').innerHTML = html;
        }

        // ✅ 调用合约函数，自动处理数组和地址清理
        async function callContract(funcName, ...args) {
            if (!contract) return alert('请先连接合约！');
            try {
                let parsedArgs = args.map(arg => {
                    if (Array.isArray(arg)) return arg;
                    if (arg === 'true') return true;
                    if (arg === 'false') return false;
                    // 如果是字符串且可能是地址，自动清理
                    if (typeof arg === 'string' && arg.startsWith('0x')) {
                        arg = cleanAddress(arg);
                    }
                    if (typeof arg === 'string' && !isNaN(arg) && arg.trim() !== '') {
                        return ethers.BigNumber.from(arg);
                    }
                    return arg;
                });
                let tx = await contract[funcName](...parsedArgs);
                await tx.wait();
                alert('✅ 交易成功！');
            } catch (e) {
                alert('❌ 失败：' + (e.reason || e.message));
            }
        }

        function handleArrayCall(funcName) {
            let addrStr = document.getElementById(funcName + '_addr').value;
            let boolVal = document.getElementById(funcName + '_bool').value === 'true';
            if (!addrStr) return alert('请输入地址');
            // 解析地址数组
            let addrArray;
            try {
                addrArray = JSON.parse(addrStr);
            } catch (e) {
                addrArray = addrStr.split(',').map(a => cleanAddress(a.trim()));
            }
            callContract(funcName, addrArray, boolVal);
        }

        function handleUint6Call(funcName) {
            let valStr = document.getElementById(funcName + '_val').value;
            if (!valStr) return alert('请输入6个数字');
            let arr = valStr.split(',').map(v => ethers.BigNumber.from(v.trim()));
            if (arr.length !== 6) return alert('必须输入6个数字');
            callContract(funcName, arr);
        }

        waitForEthers(() => {
            buildUI();
            const w = window;
            if (w.okxwallet || w.ethereum || w.okexchain) {
                document.getElementById('walletStatus').innerText = '🟢 钱包已检测到';
            }
        });
    </script>
</body>
</html>
