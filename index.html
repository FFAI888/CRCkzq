<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐼 熊猫代币 · 全能看板 V6</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0d1117; color: #c9d1d9; padding: 16px; max-width: 700px; margin: auto; }
        h1 { color: #f0a500; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .section { background: #161b22; border: 1px solid #30363d; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
        h2 { color: #58a6ff; font-size: 18px; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .row { display: flex; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .row label { width: 130px; font-weight: bold; color: #8b949e; font-size: 13px; flex-shrink: 0; }
        .row textarea, .row input, .row select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px; border-radius: 6px; font-size: 13px; margin-right: 8px; font-family: 'Courier New', monospace; }
        .row textarea { width: 100%; min-height: 40px; resize: vertical; }
        .row select { min-width: 80px; }
        .row button { background: #238636; color: white; border: 1px solid #2ea043; padding: 8px 14px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .row button:hover { background: #2ea043; }
        .current { font-size: 12px; color: #7ee787; margin-left: 8px; white-space: nowrap; }
        .note { font-size: 11px; color: #8b949e; margin-top: 4px; margin-bottom: 8px; padding-left: 130px; }
        .info-box { background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; margin-bottom: 10px; }
        .info-box p { margin: 4px 0; font-size: 13px; }
        .info-box span { color: #f0a500; font-weight: bold; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .data-grid p { margin: 4px 0; font-size: 13px; }
        #walletStatus { color: #3fb950; margin-left: 10px; font-size: 13px; }
        #walletError { color: #f85149; font-size: 13px; margin-top: 5px; }
        .contract-input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 12px; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <h1>🐼 熊猫代币 · 全能数据看板 V6</h1>
    <div class="section">
        <input type="text" class="contract-input" id="contractAddress" placeholder="代币合约地址 (0x...)">
        <div style="display:flex; align-items:center; flex-wrap:wrap;">
            <button onclick="connectWallet()" style="background:#1f6feb; border-color:#1f6feb; margin-right:10px;">连接钱包</button>
            <button onclick="connectContract()" style="background:#f0a500; border-color:#f0a500; color:black;">连接合约</button>
            <span id="walletStatus">⚪ 未连接</span>
        </div>
        <div id="walletError"></div>
    </div>

    <!-- 📊 只读数据看板（自动刷新） -->
    <div class="section" id="dashboardSection" style="display:none;">
        <h2>📊 实时数据看板 (每15秒自动刷新)</h2>
        <div class="data-grid" id="dashboardGrid">
            <!-- 由JS动态填充 -->
        </div>
        <div style="margin-top:12px; font-size:12px; color:#8b949e;">⏱️ 上次刷新：<span id="lastRefreshTime">-</span></div>
    </div>

    <!-- 查询区 -->
    <div class="section" id="infoSection" style="display:none;">
        <h2>🔍 地址查询</h2>
        <div class="row">
            <textarea id="queryAddress" placeholder="输入钱包地址" rows="1"></textarea>
            <button onclick="queryAddressStatus()">查询</button>
        </div>
        <div id="queryResult" class="info-box" style="display:none;"></div>
        <div class="row" style="margin-top:15px;">
            <label>主交易对储备</label>
            <button onclick="loadPairInfo()">刷新</button>
        </div>
        <div id="pairInfo" class="info-box"></div>
    </div>

    <!-- 参数设置区 -->
    <div id="panels"></div>

    <script>

            if (typeof ethers !== 'undefined') callback();
            else setTimeout(() => waitForEthers(callback), 500);
        }

ityFee","stateMutability":"nonpayable","inputs":[{"name":"newValue","type":"uint256"}],"outputs":[]},{"type":"function","name":"setAirDropEnable","stateMutability":"nonpayable","inputs":[{"name":"status","type":"bool"}],"outputs":[]},{"type":"function","name":"setAirdropNumbs","stateMutability":"nonpayable","inputs":[{"name":"newValue","type":"uint256"}],"outputs":[]},{"type":"function","name":"setAmountPerUnits","stateMutability":"nonpayable","inputs":[{"name":"newValue","type":"uint256"}],"outputs":[]},{"type":"function","name":"setAntiSYNCEnable","stateMutability":"nonpayable","inputs":[{"name":"s","type":"bool"}],"outputs":[]},{"type":"function","name":"setClaims","stateMutability":"nonpayable","inputs":[{"name":"token","type":"address"},{"name":"amount","type":"uint256"}],"outputs":[]},{"type":"function","name":"setCooldownEnabled","stateMutability":"nonpayable","inputs":[{"name":"flag","type":"bool"}],"outputs":[]},{"type":"function","name":"setCooldownTime","stateMutability":"nonpayable","inputs":[{"name":"_seconds","type":"uint256"}],"outputs":[]},{"type":"function","name":"setEnableChangeTax","stateMutability":"nonpayable","inputs":[{"name":"flag","type":"bool"}],"outputs":[]},{"type":"function","name":"setEnableKillBlock","stateMutability":"nonpayable","inputs":[{"name":"flag","type":"bool"}],"outputs":[]},{"type":"function","name":"setEnableMint","stateMutability":"nonpayable","inputs":[{"name":"flag","type":"bool"}],"outputs":[]},{"type":"function","name":"setEnablePause","stateMutability":"nonpayable","inputs":[{"name":"flag","type":"bool"}],"outputs":[]},{"type":"function","name":"setEnableRewardList","stateMutability":"nonpayable","inputs":[{"name":"flag","type":"bool"}],"outputs":[]},{"type":"function","name":"setEnableWalletLimit","stateMutability":"nonpayable","inputs":[{"name":"flag","type":"bool"}],"outputs":[]},{"type":"function","name":"setFeeWhiteList","stateMutability":"nonpayable","inputs":[{"name":"addr","type":"address[]"},{"name":"enable"         function cleanAddress(addr) { return addr ? addr.replace(/\s+/g, '') : ''; }
        function isValidAddress(addr) { return ethers.utils.isAddress(addr); }

        function getProvider() {
            const w = window;
            if (w.okxwallet) return new ethers.providers.Web3Provider(w.okxwallet);
            if (w.ethereum) return new ethers.providers.Web3Provider(w.ethereum);
            document.getElementById('walletError').innerText = '❌ 未检测到钱包，请使用欧易App内置浏览器打开。';
            return null;
        }

        async function connectWallet() {
            try {
                document.getElementById('walletError').innerText = '';
                const provider = getProvider();
                if (!provider) return;
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                document.getElementById('walletStatus').innerText = '✅ 已连接：' + (await signer.getAddress()).slice(0,6)+'...';
            } catch (e) {
                document.getElementById('walletError').innerText = '连接失败：' + e.message;
            }
        }

        async function connectContract() {
            let addr = cleanAddress(document.getElementById('contractAddress').value);
            if (!isValidAddress(addr)) return alert('合约地址无效');
            if (!signer) await connectWallet();
            if (!signer) return alert('请先连接钱包');
            try {
                const provider = getProvider();
                contract = new ethers.Contract(addr, contractABI, provider.getSigner());
                decimals = await contract.decimals();
                mainPairAddress = await contract._mainPair();
                alert('✅ 合约已连接！');
                document.getElementById('dashboardSection').style.display = 'block';
                document.getElementById('infoSection').style.display = 'block';
                refreshDashboard();
                setInterval(refreshDashboard, 15000); // 15秒自动刷新
                loadPairInfo();
            } catch (e) {
                alert('合约连接失败：' + (e.reason || e.message));
            }
        }

        // --- 数据看板核心 ---
        async function refreshDashboard() {
            if (!contract) return;
            const dataPoints = [
                { label: '代币名称', func: 'name' },
                { label: '代币符号', func: 'symbol' },
                { label: '精度', func: 'decimals' },
                { label: '总供应量', func: 'totalSupply', format: 'amount' },
                { label: '流通量', func: 'getCirculatingSupply', format: 'amount' },
                { label: '最大持币限制', func: 'maxWalletAmount', format: 'amount' },
                { label: '当前暂停状态', func: 'pause', format: 'bool' },
                { label: '暂停功能启用', func: 'enablePause', format: 'bool' },
                { label: '钱包限制启用', func: 'enableWalletLimit', format: 'bool' },
                { label: '黑名单功能启用', func: 'enableRewardList', format: 'bool' },
                { label: '杀区块启用', func: 'enableKillBlock', format: 'bool' },
                { label: '保护区块数', func: 'kb' },
                { label: '空投启用', func: 'airdropEnable', format: 'bool' },
                { label: '空投人数', func: 'airdropNumbs' },
                { label: '增发启用', func: 'enableMint', format: 'bool' },
                { label: '税率可改', func: 'enableChangeTax', format: 'bool' },
                { label: '自动兑换比例', func: 'numTokensSellRate', suffix: '%' },
                { label: '买入: 基金费', func: '_buyFundFee', suffix: ' / 10000' },
                { label: '买入: LP费', func: '_buyLPFee', suffix: ' / 10000' },
                { label: '买入: 销毁费', func: 'buy_burnFee', suffix: ' / 10000' },
                { label: '卖出: 基金费', func: '_sellFundFee', suffix: ' / 10000' },
                { label: '卖出: LP费', func: '_sellLPFee', suffix: ' / 10000' },
                { label: '卖出: 销毁费', func: 'sell_burnFee', suffix: ' / 10000' },
                { label: '添加流动性费', func: 'addLiquidityFee', suffix: ' / 10000' },
                { label: '移除流动性费', func: 'removeLiquidityFee', suffix: ' / 10000' },
                { label: 'LP销毁比例', func: 'lpBurnRate', suffix: ' (万分比)' },
                { label: 'LP销毁频率', func: 'lpBurnFrequency', suffix: ' 秒' },
                { label: '冷却启用', func: 'cooldownEnabled', format: 'bool' },
                { label: '冷却时间', func: 'cooldownTime', suffix: ' 秒' },
                { label: '预售价格', func: 'price', format: 'amount' },
                { label: '预售每份数量', func: 'amountPerUnits', format: 'amount' },
                { label: '预售已售份数', func: 'minted' },
                { label: '预售总份数', func: 'mintLimit' },
                { label: '合约所有者', func: 'owner', format: 'address' },
                { label: '基金地址', func: 'fundAddress', format: 'address' },
                { label: '累积基金收入', func: 'totalFundAmountReceive', format: 'amount' },
                { label: '交易启动区块', func: 'startTradeBlock' },
                { label: '上次LP销毁时间', func: 'lastLpBurnTime', format: 'timestamp' },
                { label: '上次全局买单时间', func: 'lastGlobalBuyTime', format: 'timestamp' },
                { label: '主交易对', func: '_mainPair', format: 'address' },
                { label: '防闪电贷', func: 'antiSYNC', format: 'bool' },
                { label: '基础货币', func: 'currency', format: 'address' },
                { label: '是否原生币', func: 'currencyIsEth', format: 'bool' },
            ];

            let html = '';
            for (let dp of dataPoints) {
                try {
                    let raw = await contract[dp.func]();
                    let display;
                    if (dp.format === 'bool') {
                        display = raw ? '✅' : '❌';
                    } else if (dp.format === 'address') {
                        display = raw.length > 10 ? raw.slice(0,6)+'...'+raw.slice(-4) : raw;
                    } else if (dp.format === 'amount') {
                        display = ethers.utils.formatUnits(raw, decimals);
                    } else if (dp.format === 'timestamp') {
                        display = raw.toString() === '0' ? '从未' : new Date(raw.toNumber() * 1000).toLocaleString();
                    } else {
                        display = raw.toString();
                    }
                    if (dp.suffix) display += dp.suffix;
                    html += `<p><strong>${dp.label}</strong> <span>${display}</span></p>`;
                } catch (e) {
                    html += `<p><strong>${dp.label}</strong> <span style="color:#f85149;">读取失败</span></p>`;
                }
            }
            document.getElementById('dashboardGrid').innerHTML = html;
            document.getElementById('lastRefreshTime').innerText = new Date().toLocaleTimeString();
        }

        // --- 地址查询、交易对 ---
        async function queryAddressStatus() {
            if (!contract) return alert('请先连接合约');
            let addr = cleanAddress(document.getElementById('queryAddress').value);
            if (!isValidAddress(addr)) return alert('地址无效');
            try {
                let allWhite = await contract._allWhiteList(addr);
                let feeWhite = await contract._feeWhiteList(addr);
                let reward = await contract._rewardList(addr);
                let swapPair = await contract._swapPairList(addr);
                let balance = await contract.balanceOf(addr);
                let resultHtml = `
                    <p>地址：<span>${addr}</span></p>
                    <p>全功能白名单：<span>${allWhite ? '✅ 是' : '❌ 否'}</span></p>
                    <p>手续费白名单：<span>${feeWhite ? '✅ 是' : '❌ 否'}</span></p>
                    <p>黑名单：<span>${reward ? '⚠️ 是' : '❌ 否'}</span></p>
                    <p>交易对：<span>${swapPair ? '✅ 是' : '❌ 否'}</span></p>
                    <p>代币余额：<span>${ethers.utils.formatUnits(balance, decimals)} CRC</span></p>
                `;
                document.getElementById('queryResult').innerHTML = resultHtml;
                document.getElementById('queryResult').style.display = 'block';
            } catch (e) {
                alert('查询失败：' + e.message);
            }
        }

        async function loadPairInfo() {
            if (!contract || !mainPairAddress) return;
            const pairABI = [
                "function getReserves() external view returns (uint112 reserve0, uint112 reserve1, uint32 blockTimestampLast)",
                "function token0() external view returns (address)",
                "function token1() external view returns (address)"
            ];
            try {
                const provider = getProvider();
                const pair = new ethers.Contract(mainPairAddress, pairABI, provider);
                const [res0, res1, ts] = await pair.getReserves();
                const token0 = await pair.token0();
                const isToken0 = token0.toLowerCase() === contract.address.toLowerCase();
                const tokenReserve = isToken0 ? res0 : res1;
                const usdtReserve = isToken0 ? res1 : res0;
                document.getElementById('pairInfo').innerHTML = `
                    <p>交易对地址：<span>${mainPairAddress}</span></p>
                    <p>CRC储备量：<span>${ethers.utils.formatUnits(tokenReserve, decimals)} CRC</span></p>
                    <p>USDT储备量：<span>${ethers.utils.formatUnits(usdtReserve, 18)} USDT</span></p>
                    <p>更新时间：<span>${new Date(ts * 1000).toLocaleString()}</span></p>
                `;
            } catch (e) {
                document.getElementById('pairInfo').innerHTML = `<p style="color:#f85149;">获取失败：${e.message}</p>`;
            }
        }

        // --- 交易与设置（沿用V5稳定逻辑）---
        async function _sendTransaction(funcName, argsArray) {
            if (!contract) { alert('请先连接合约'); return false; }
            try {
                let finalArgs = argsArray.map(arg => {
                    if (arg === 'true') return true;
                    if (arg === 'false') return false;
                    if (Array.isArray(arg)) return arg;
                    if (ethers.BigNumber.isBigNumber(arg)) return arg;
                    if (typeof arg === 'string') {
                        let cleaned = arg.trim();
                        if (cleaned.startsWith('0x')) {
                            cleaned = cleanAddress(cleaned);
                            if (!isValidAddress(cleaned)) throw new Error('无效地址：' + cleaned);
                            return cleaned;
                        }
                        if (!isNaN(cleaned) && cleaned !== '') return ethers.BigNumber.from(cleaned);
                        return cleaned;
                    }
                    return arg;
                });
                let tx = await contract[funcName](...finalArgs);
                await tx.wait();
                return true;
            } catch (e) {
                alert('❌ 失败：' + (e.reason || e.message));
                return false;
            }
        }

        async function executeAndRefresh(funcName, ...args) {
            if (await _sendTransaction(funcName, args)) {
                refreshDashboard();
                loadPairInfo();
                alert('✅ 操作成功，数据已更新');
            }
        }

        function handleArrayCall(funcName) {
            let addrStr = document.getElementById(funcName + '_addr').value;
            let boolVal = document.getElementById(funcName + '_bool').value;
            if (!addrStr) return alert('请输入地址');
            let addrArray;
            try { addrArray = JSON.parse(addrStr); } catch (e) { addrArray = addrStr.split(',').map(a => cleanAddress(a.trim())); }
            executeAndRefresh(funcName, addrArray, boolVal);
        }

        function handleUint6Call(funcName) {
            let valStr = document.getElementById(funcName + '_val').value;
            if (!valStr) return alert('请输入6个数字');
            let arr = valStr.split(',').map(v => ethers.BigNumber.from(v.trim()));
            if (arr.length !== 6) return alert('必须输入6个数字');
            executeAndRefresh(funcName, arr);
        }

        function buildUI() {
            const sections = [
                { title: '⚡ 交易控制', items: [
                    { label: '开启交易', func: 'recoverTransaction', type: 'action' },
                    { label: '暂停交易', func: 'PauseTransaction', type: 'action' },
                    { label: '暂停功能开关', func: 'setEnablePause', type: 'bool' }
                ]},
                { title: '💰 钱包限制', items: [
                    { label: '启用钱包限额', func: 'setEnableWalletLimit', type: 'bool' },
                    { label: '最大持币量', func: 'changeWalletLimit', type: 'uint256' }
                ]},
                { title: '📋 白名单/黑名单', items: [
                    { label: '全功能白名单', func: 'setWhiteList', type: 'addressBoolArray' },
                    { label: '手续费白名单', func: 'setFeeWhiteList', type: 'addressBoolArray' },
                    { label: '黑名单功能开关', func: 'setEnableRewardList', type: 'bool' },
                    { label: '批量拉黑', func: 'multi_bclist', type: 'addressBoolArray' }
                ]},
                { title: '🧾 税率设置', items: [
                    { label: '允许修改税率', func: 'setEnableChangeTax', type: 'bool' },
                    { label: '修改买卖税率', func: 'completeCustoms', type: 'uint256[6]', note: '买基金,买LP,买销毁,卖基金,卖LP,卖销毁' },
                    { label: '自动兑换比例', func: 'setNumTokensSellRate', type: 'uint256' },
                    { label: '添加流动性费率', func: 'setAddLiquidityFee', type: 'uint256' },
                    { label: '移除流动性费率', func: 'setRemoveLiquidityFee', type: 'uint256' }
                ]},
                { title: '🔥 LP销毁', items: [
                    { label: '销毁比例', func: 'setlpBurnRate', type: 'uint256' },
                    { label: '销毁频率(小时)', func: 'setlpBurnFrequency', type: 'uint256' }
                ]},
                { title: '🛡️ 防狙击', items: [
                    { label: '启用杀区块', func: 'setEnableKillBlock', type: 'bool' },
                    { label: '保护区块数', func: 'setkb', type: 'uint256' }
                ]},
                { title: '🎁 空投', items: [
                    { label: '启用空投', func: 'setAirDropEnable', type: 'bool' },
                    { label: '空投人数', func: 'setAirdropNumbs', type: 'uint256' }
                ]},
                { title: '🏭 增发', items: [
                    { label: '启用增发', func: 'setEnableMint', type: 'bool' },
                    { label: '增发代币', func: 'mintTokens', type: 'addressUint' }
                ]},
                { title: '💎 预售参数', items: [
                    { label: '预售价格', func: 'setPrice', type: 'uint256' },
                    { label: '每份数量', func: 'setAmountPerUnits', type: 'uint256' },
                    { label: '预售总份数', func: 'setMintLimit', type: 'uint256' }
                ]},
                { title: '⏳ 交易冷却', items: [
                    { label: '启用冷却', func: 'setCooldownEnabled', type: 'bool' },
                    { label: '冷却时间(秒)', func: 'setCooldownTime', type: 'uint256' }
                ]},
                { title: '👑 所有权', items: [
                    { label: '转移所有权', func: 'transferOwnership', type: 'address' }
                ]},
                { title: '🏦 基金与交易对', items: [
                    { label: '设置基金地址', func: 'setFundAddress', type: 'address' },
                    { label: '设置交易对', func: 'setSwapPairList', type: 'addressBool' },
                    { label: '防闪电贷开关', func: 'setAntiSYNCEnable', type: 'bool' }
                ]},
                { title: '💸 提现', items: [
                    { label: '提取代币/BNB', func: 'setClaims', type: 'addressUint', note: '代币地址(0x0为BNB) + 数量' }
                ]}
            ];

            let html = '';
            for (let sec of sections) {
                html += `<div class="section"><h2>${sec.title}</h2>`;
                for (let item of sec.items) {
                    let inputHtml = '';
                    if (item.type === 'action') {
                        inputHtml = `<button onclick="executeAndRefresh('${item.func}')">执行</button>`;
                    } else if (item.type === 'bool') {
                        inputHtml = `<select id="${item.func}_val"><option value="true">开启</option><option value="false">关闭</option></select>`;
                        inputHtml += `<button onclick="executeAndRefresh('${item.func}', document.getElementById('${item.func}_val').value)">设置</button>`;
                    } else if (item.type === 'uint256') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="数字">`;
                        inputHtml += `<button onclick="executeAndRefresh('${item.func}', document.getElementById('${item.func}_val').value)">设置</button>`;
                    } else if (item.type === 'address') {
                        inputHtml = `<textarea id="${item.func}_val" placeholder="0x..." rows="1"></textarea>`;
                        inputHtml += `<button onclick="executeAndRefresh('${item.func}', document.getElementById('${item.func}_val').value)">设置</button>`;
                    } else if (item.type === 'addressBool') {
                        inputHtml = `<textarea id="${item.func}_addr" placeholder="地址" rows="1"></textarea>`;
                        inputHtml += `<select id="${item.func}_bool"><option value="true">true</option><option value="false">false</option></select>`;
                        inputHtml += `<button onclick="executeAndRefresh('${item.func}', document.getElementById('${item.func}_addr').value, document.getElementById('${item.func}_bool').value)">设置</button>`;
                    } else if (item.type === 'addressBoolArray') {
                        inputHtml = `<textarea id="${item.func}_addr" placeholder='["0x...","0x..."] 或 逗号分隔' rows="2"></textarea>`;
                        inputHtml += `<select id="${item.func}_bool"><option value="true">true</option><option value="false">false</option></select>`;
                        inputHtml += `<button onclick="handleArrayCall('${item.func}')">设置</button>`;
                    } else if (item.type === 'uint256[6]') {
                        inputHtml = `<input type="text" id="${item.func}_val" placeholder="100,100,100,100,100,100">`;
                        inputHtml += `<button onclick="handleUint6Call('${item.func}')">设置</button>`;
                    } else if (item.type === 'addressUint') {
                        inputHtml = `<textarea id="${item.func}_addr" placeholder="地址" rows="1"></textarea>`;
                        inputHtml += `<input type="text" id="${item.func}_amount" placeholder="数量">`;
                        inputHtml += `<button onclick="executeAndRefresh('${item.func}', document.getElementById('${item.func}_addr').value, document.getElementById('${item.func}_amount').value)">设置</button>`;
                    }
                    let note = item.note ? `<div class="note">💡 ${item.note}</div>` : '';
                    html += `<div class="row"><label>${item.label}</label>${inputHtml}</div>${note}`;
                }
                html += `</div>`;
            }
            document.getElementById('panels').innerHTML = html;
        }

        waitForEthers(() => {
            buildUI();
            if (window.okxwallet || window.ethereum) {
                document.getElementById('walletStatus').innerText = '🟢 钱包已检测到';
            }
        });
    </script>
